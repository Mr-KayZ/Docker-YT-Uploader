# docker-compose.release.yml
# For end users installing from GitHub Container Registry.
# Usage: docker compose -f docker-compose.release.yml up -d

services:
  yt-uploader:
    image: ghcr.io/mr-kayz/docker-yt-uploader:latest
    container_name: docker-yt-uploader
    ports:
      - "4321:4321"
    volumes:
      - ./videos:/videos
      - ./auth:/auth
      - ./data:/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      - AUTH_DIR=/auth
      - DATA_DIR=/data
      - VIDEOS_DIR=/videos
      # Optional: pre-set your server address to skip the setup wizard step.
      # If omitted, you will be prompted to enter it on the setup page.
      # Example: PUBLIC_URL=http://192.168.1.50:4321
      # - PUBLIC_URL=
    restart: unless-stopped