services:
  yt-uploader:
    build: .
    container_name: docker-yt-uploader
    ports:
      - "4321:4321"
    volumes:
      - ./uploads:/uploads
      - ./auth:/auth
      - ./data:/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped