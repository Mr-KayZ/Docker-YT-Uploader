services:
  yt-uploader:
    build: .
    container_name: docker-yt-uploader
    ports:
      - "4321:4321"
    volumes:
      - ./videos:/videos
      - ./auth:/auth
      - ./data:/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      - AUTH_DIR=/auth
      - DATA_DIR=/data
      - VIDEOS_DIR=/videos
    restart: unless-stopped